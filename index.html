<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ MTPQI Memory Game — 14 Realms</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cinzel', serif;
            background: linear-gradient(135deg, #0d1117 0%, #2a1f1a 50%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #f0c419;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .selector-idioma {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn-idioma {
            padding: 8px 12px;
            border: 2px solid #d4a017;
            background: rgba(212, 160, 23, 0.1);
            color: #f0c419;
            cursor: pointer;
            border-radius: 6px;
            font-family: 'Cinzel', serif;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .btn-idioma:hover {
            background: rgba(212, 160, 23, 0.3);
        }

        .btn-idioma.ativo {
            background: #d4a017;
            color: #0d1117;
            border-color: #f0c419;
        }

        .menu {
            text-align: center;
        }

        .menu.hidden {
            display: none;
        }

        .titulo {
            font-size: 2.5em;
            font-weight: 900;
            color: #d4a017;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
            letter-spacing: 2px;
        }

        .subtitulo {
            color: #f0c419;
            margin-bottom: 30px;
            font-size: 1em;
            opacity: 0.9;
        }

        .emoji-grande {
            font-size: 4em;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .secao-reinos {
            margin-bottom: 30px;
        }

        .titulo-reinos {
            color: #d4a017;
            font-size: 1.2em;
            margin-bottom: 15px;
            border-bottom: 2px solid #d4a017;
            padding-bottom: 10px;
        }

        .grid-reinos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px;
            font-size: 0.95em;
            font-weight: bold;
            border: 2px solid #d4a017;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            background: rgba(212, 160, 23, 0.1);
            color: #f0c419;
        }

        button:hover {
            background: rgba(212, 160, 23, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(212, 160, 23, 0.5);
        }

        .btn-reino.ativo {
            background: #d4a017;
            color: #0d1117;
            border-color: #f0c419;
        }

        .dificuldade-seletor {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .btn-dificuldade {
            flex: 1;
            padding: 10px;
            font-size: 0.9em;
        }

        .btn-dificuldade.ativo {
            background: #27ae60;
            border-color: #27ae60;
            color: #fff;
        }

        .btn-jogar {
            width: 100%;
            background: linear-gradient(135deg, #d4a017 0%, #f0c419 100%);
            color: #0d1117;
            padding: 14px;
            font-size: 1.1em;
            margin-top: 20px;
            border: none;
        }

        .btn-jogar:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(212, 160, 23, 0.6);
        }

        .jogo {
            display: none;
        }

        .jogo.ativo {
            display: block;
        }

        .header-jogo {
            margin-bottom: 20px;
            text-align: center;
        }

        .titulo-jogo {
            font-size: 1.8em;
            color: #d4a017;
            margin-bottom: 10px;
        }

        .reino-jogo {
            font-size: 0.9em;
            color: #f0c419;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(212, 160, 23, 0.1);
            padding: 12px;
            border-radius: 6px;
            border: 2px solid #d4a017;
            text-align: center;
        }

        .stat-label {
            color: #f0c419;
            font-size: 0.8em;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .stat-valor {
            font-size: 1.4em;
            font-weight: bold;
            color: #d4a017;
            font-family: 'Courier New', monospace;
        }

        .btn-menu-jogo {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(212, 160, 23, 0.2);
            color: #d4a017;
            padding: 8px 12px;
            font-size: 0.9em;
            border-radius: 6px;
        }

        .btn-menu-jogo:hover {
            background: rgba(212, 160, 23, 0.4);
        }

        .grid-cartas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .carta {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #2a1f1a 0%, #1a1410 100%);
            border: 2px solid #d4a017;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75em;
            padding: 10px;
            color: #f0c419;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            line-height: 1.2;
        }

        .carta::before {
            content: attr(data-icon);
            position: absolute;
            font-size: 2em;
            opacity: 0.15;
            top: 5px;
            right: 5px;
        }

        .carta:hover:not(.casada) {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(212, 160, 23, 0.4);
            border-color: #f0c419;
        }

        .carta.virada {
            background: linear-gradient(135deg, #d4a017 0%, #f0c419 100%);
            color: #0d1117;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(212, 160, 23, 0.6);
            border-color: #f0c419;
        }

        .carta.casada {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: #ecfdf5;
            opacity: 0.5;
            cursor: default;
            border-color: #27ae60;
        }

        .overlay-vitoria {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .overlay-vitoria.ativo {
            display: flex;
        }

        .card-vitoria {
            background: linear-gradient(135deg, #1a3a2a 0%, #0d1117 100%);
            border: 3px solid #d4a017;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
        }

        .emoji-vitoria {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .titulo-vitoria {
            font-size: 1.8em;
            color: #27ae60;
            margin-bottom: 10px;
        }

        .texto-vitoria {
            color: #a7f3d0;
            margin-bottom: 20px;
        }

        .box-tempo-vitoria {
            background: rgba(212, 160, 23, 0.1);
            border: 2px solid #d4a017;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .tempo-label {
            color: #d4a017;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .tempo-valor {
            font-size: 2em;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #f0c419;
        }

        .btn-voltar {
            width: 100%;
            background: #d4a017;
            color: #0d1117;
            padding: 12px;
            font-size: 1em;
            border: none;
        }

        .btn-voltar:hover {
            transform: scale(1.02);
            background: #f0c419;
        }

        @media (max-width: 480px) {
            .titulo {
                font-size: 1.8em;
            }

            .grid-reinos {
                grid-template-columns: 1fr;
            }

            .grid-cartas {
                gap: 8px;
            }

            .carta {
                font-size: 0.65em;
            }

            .selector-idioma {
                gap: 4px;
            }

            .btn-idioma {
                padding: 6px 10px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SELETOR DE IDIOMA -->
        <div class="selector-idioma">
            <button class="btn-idioma ativo" onclick="mudarIdioma('pt')">🇧🇷 Português</button>
            <button class="btn-idioma" onclick="mudarIdioma('en')">🇺🇸 English</button>
            <button class="btn-idioma" onclick="mudarIdioma('zh')">🇨🇳 中文</button>
        </div>

        <!-- MENU INICIAL -->
        <div id="menu" class="menu">
            <div class="emoji-grande">⚔️</div>
            <h1 class="titulo" id="titulo-principal">MTPQI</h1>
            <p class="subtitulo" id="subtitulo-principal">Jogo da Memória — 14 Reinos</p>

            <!-- REINOS BÁSICOS -->
            <div class="secao-reinos">
                <div class="titulo-reinos" id="label-basicos">🌍 Reinos Básicos</div>
                <div class="grid-reinos">
                    <button class="btn-reino" onclick="selecionarReino(0)">📜 <span id="reino0">Pesquisa Quanti</span></button>
                    <button class="btn-reino" onclick="selecionarReino(1)">🏔️ <span id="reino1">Estatística Descritiva</span></button>
                    <button class="btn-reino" onclick="selecionarReino(2)">🏛️ <span id="reino2">Probabilidade</span></button>
                    <button class="btn-reino" onclick="selecionarReino(3)">🏘️ <span id="reino3">Amostragem</span></button>
                </div>
            </div>

            <!-- REINOS INTERMEDIÁRIOS -->
            <div class="secao-reinos">
                <div class="titulo-reinos" id="label-intermediarios">⚖️ Reinos Intermediários</div>
                <div class="grid-reinos">
                    <button class="btn-reino" onclick="selecionarReino(4)">⚖️ <span id="reino4">Testes de Hipóteses</span></button>
                    <button class="btn-reino" onclick="selecionarReino(5)">🗡️ <span id="reino5">Teste t</span></button>
                    <button class="btn-reino" onclick="selecionarReino(6)">🌈 <span id="reino6">TOST</span></button>
                    <button class="btn-reino" onclick="selecionarReino(7)">🍖 <span id="reino7">ANOVA (1 Fator)</span></button>
                </div>
            </div>

            <!-- REINOS AVANÇADOS -->
            <div class="secao-reinos">
                <div class="titulo-reinos" id="label-avancados">👑 Reinos Avançados</div>
                <div class="grid-reinos">
                    <button class="btn-reino" onclick="selecionarReino(8)">🧪 <span id="reino8">ANOVA Fatorial</span></button>
                    <button class="btn-reino" onclick="selecionarReino(9)">⏳ <span id="reino9">ANOVA MR</span></button>
                    <button class="btn-reino" onclick="selecionarReino(10)">📚 <span id="reino10">ANCOVA</span></button>
                    <button class="btn-reino" onclick="selecionarReino(11)">🏛️ <span id="reino11">MANOVA</span></button>
                    <button class="btn-reino" onclick="selecionarReino(12)">👑 <span id="reino12">MANCOVA</span></button>
                    <button class="btn-reino" onclick="selecionarReino(13)">❄️ <span id="reino13">Não-Paramétricos</span></button>
                </div>
            </div>

            <!-- DIFICULDADE -->
            <div style="margin-top: 25px; padding-top: 20px; border-top: 2px solid #d4a017;">
                <div style="color: #d4a017; font-size: 0.95em; margin-bottom: 15px;" id="label-dificuldade">Dificuldade</div>
                <div class="dificuldade-seletor">
                    <button class="btn-dificuldade ativo" onclick="selecionarDificuldade('facil')" id="btn-facil">Fácil (4)</button>
                    <button class="btn-dificuldade" onclick="selecionarDificuldade('normal')" id="btn-normal">Normal (6)</button>
                    <button class="btn-dificuldade" onclick="selecionarDificuldade('dificil')" id="btn-dificil">Difícil (8)</button>
                </div>
            </div>

            <button class="btn-jogar" onclick="iniciarJogo()" id="btn-jogar">⚔️ Começar Jogo</button>
        </div>

        <!-- JOGO -->
        <div id="jogo" class="jogo">
            <button class="btn-menu-jogo" onclick="voltarMenu()" id="btn-menu-jogo">← Menu</button>
            
            <div class="header-jogo">
                <div class="titulo-jogo" id="titulo-reino">🏔️ Estatística Descritiva</div>
                <div class="reino-jogo" id="info-dificuldade">Modo Normal — 6 pares</div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-label" id="label-tempo">⏱️ Tempo</div>
                        <div class="stat-valor" id="tempo">00:00</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label" id="label-pares">✓ Pares</div>
                        <div class="stat-valor" id="pares">0/6</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label" id="label-restam">🎯 Restam</div>
                        <div class="stat-valor" id="restam">6</div>
                    </div>
                </div>
            </div>

            <div class="grid-cartas" id="grid-cartas"></div>
        </div>
    </div>

    <!-- TELA DE VITÓRIA -->
    <div id="overlay-vitoria" class="overlay-vitoria">
        <div class="card-vitoria">
            <div class="emoji-vitoria">🎉</div>
            <h2 class="titulo-vitoria" id="titulo-vitoria">Vitória!</h2>
            <p class="texto-vitoria" id="texto-vitoria">Você conquistou este reino!</p>

            <div class="box-tempo-vitoria">
                <div class="tempo-label" id="label-tempo-final">Tempo Final</div>
                <div class="tempo-valor" id="tempo-final">00:00</div>
            </div>

            <button class="btn-voltar" onclick="voltarMenu()" id="btn-voltar-menu">← Voltar ao Menu</button>
        </div>
    </div>

                    { id: 19, pt: { q: "Q19", a: "A19" }, en: { q: "Q19_EN", a: "A19_EN" }, zh: { q: "Q19_ZH", a: "A19_ZH" } },
                    { id: 20, pt: { q: "Q20", a: "A20" }, en: { q: "Q20_EN", a: "A20_EN" }, zh: { q: "Q20_ZH", a: "A20_ZH" } },
                    { id: 21, pt: { q: "Q21", a: "A21" }, en: { q: "Q21_EN", a: "A21_EN" }, zh: { q: "Q21_ZH", a: "A21_ZH" } },
                    { id: 22, pt: { q: "Q22", a: "A22" }, en: { q: "Q22_EN", a: "A22_EN" }, zh: { q: "Q22_ZH", a: "A22_ZH" } },
                    { id: 23, pt: { q: "Q23", a: "A23" }, en: { q: "Q23_EN", a: "A23_EN" }, zh: { q: "Q23_ZH", a: "A23_ZH" } },
                    { id: 24, pt: { q: "Q24", a: "A24" }, en: { q: "Q24_EN", a: "A24_EN" }, zh: { q: "Q24_ZH", a: "A24_ZH" } },
                ]
            },
        ];

        let idioma = 'pt';
        let estado = {
            renoAtual: null,
            cartas: [],
            viradas: new Set(),
            paresCompletos: new Set(),
            selecionadas: [],
            tempo: 0,
            pontos: 0,
            jogoCompleto: false,
            intervaloTempo: null,
            dificuldade: 'normal',
            paresTotal: 6,
            bloqueado: false
        };

        function mudarIdioma(novoIdioma) {
            idioma = novoIdioma;
            document.querySelectorAll('.btn-idioma').forEach(btn => btn.classList.remove('ativo'));
            event.target.classList.add('ativo');
            atualizarTextos();
        }

        function atualizarTextos() {
            const t = textos[idioma];
            document.getElementById('titulo-principal').textContent = t.titulo;
            document.getElementById('subtitulo-principal').textContent = t.subtitulo;
            document.getElementById('label-basicos').textContent = t.labelBasicos;
            document.getElementById('label-intermediarios').textContent = t.labelIntermediarios;
            document.getElementById('label-avancados').textContent = t.labelAvancados;
            document.getElementById('label-dificuldade').textContent = t.labelDificuldade;
            document.getElementById('btn-facil').textContent = t.btnFacil;
            document.getElementById('btn-normal').textContent = t.btnNormal;
            document.getElementById('btn-dificil').textContent = t.btnDificil;
            document.getElementById('btn-jogar').textContent = t.btnJogar;
            document.getElementById('btn-menu-jogo').textContent = t.btnMenu;
            document.getElementById('titulo-vitoria').textContent = t.tituloVitoria;
            document.getElementById('texto-vitoria').textContent = t.textoVitoria;
            document.getElementById('label-tempo-final').textContent = t.labelTempoFinal;
            document.getElementById('btn-voltar-menu').textContent = t.btnVoltarMenu;
            document.getElementById('label-tempo').textContent = t.labelTempo;
            document.getElementById('label-pares').textContent = t.labelPares;
            document.getElementById('label-restam').textContent = t.labelRestam;

            // Atualizar nomes dos reinos
            t.reinos.forEach((nome, idx) => {
                const elem = document.getElementById('reino' + idx);
                if (elem) elem.textContent = nome;
            });
        }

        function selecionarReino(idx) {
            document.querySelectorAll('.btn-reino').forEach(btn => btn.classList.remove('ativo'));
            event.target.classList.add('ativo');
            estado.renoAtual = idx;
        }

        function selecionarDificuldade(dif) {
            document.querySelectorAll('.btn-dificuldade').forEach(btn => btn.classList.remove('ativo'));
            event.target.classList.add('ativo');
            estado.dificuldade = dif;
            estado.paresTotal = dif === 'facil' ? 4 : dif === 'normal' ? 6 : 8;
        }

        function iniciarJogo() {
            if (estado.renoAtual === null) {
                alert(idioma === 'pt' ? 'Selecione um reino!' : idioma === 'en' ? 'Select a realm!' : '选择一个王国!');
                return;
            }

            const reino = reinos[estado.renoAtual];
            estado.tempo = 0;
            estado.pontos = 0;
            estado.jogoCompleto = false;
            estado.viradas = new Set();
            estado.paresCompletos = new Set();
            estado.selecionadas = [];

            document.getElementById('menu').classList.add('hidden');
            document.getElementById('jogo').classList.add('ativo');

            const paresDisponiveis = [...reino.pares];
            const paresSelecionados = [];
            for (let i = 0; i < estado.paresTotal && paresDisponiveis.length > 0; i++) {
                const idx = Math.floor(Math.random() * paresDisponiveis.length);
                paresSelecionados.push(paresDisponiveis[idx]);
                paresDisponiveis.splice(idx, 1);
            }

            const cartasGeradas = [];
            paresSelecionados.forEach((par, idx) => {
                const idioma_chave = idioma === 'pt' ? 'pt' : idioma === 'en' ? 'en' : 'zh';
                const texto_pergunta = par[idioma_chave].q;
                const texto_resposta = par[idioma_chave].a;
                
                cartasGeradas.push({ id: idx * 2, parId: par.id, conteudo: texto_pergunta, tipo: 'pergunta', icon: '❓' });
                cartasGeradas.push({ id: idx * 2 + 1, parId: par.id, conteudo: texto_resposta, tipo: 'resposta', icon: '✓' });
            });

            for (let i = cartasGeradas.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cartasGeradas[i], cartasGeradas[j]] = [cartasGeradas[j], cartasGeradas[i]];
            }

            estado.cartas = cartasGeradas;

            document.getElementById('titulo-reino').textContent = reino.emoji + ' ' + (idioma === 'pt' ? reino.nome : idioma === 'en' ? textos.en.reinos[estado.renoAtual] : textos.zh.reinos[estado.renoAtual]);
            const diff_text = idioma === 'pt' ? (estado.dificuldade === 'facil' ? 'Fácil' : estado.dificuldade === 'normal' ? 'Normal' : 'Difícil') : idioma === 'en' ? (estado.dificuldade === 'facil' ? 'Easy' : estado.dificuldade === 'normal' ? 'Normal' : 'Hard') : (estado.dificuldade === 'facil' ? '简单' : estado.dificuldade === 'normal' ? '中等' : '困难');
            document.getElementById('info-dificuldade').textContent = `${diff_text} — ${estado.paresTotal} ${idioma === 'pt' ? 'pares' : idioma === 'en' ? 'pairs' : '对'}`;

            renderizarGrid();
            atualizarUI();

            if (estado.intervaloTempo) clearInterval(estado.intervaloTempo);
            estado.intervaloTempo = setInterval(() => {
                estado.tempo++;
                atualizarUI();
            }, 1000);
        }

        function renderizarGrid() {
            const grid = document.getElementById('grid-cartas');
            grid.innerHTML = '';

            const iconesPorReino = [
                ['📜', '🖋️', '📝', '✍️', '🧮', '🔬'],
                ['🏔️', '⛰️', '🪨', '📊', '📈', '🔢'],
                ['🏛️', '🎲', '🃏', '🎯', '🔮', '🎪'],
                ['🏘️', '👥', '🤝', '📍', '🗺️', '🧭'],
                ['⚖️', '⚔️', '🛡️', '👑', '🔱', '⚗️'],
                ['🗡️', '🛠️', '⚙️', '🔧', '🏹', '🎯'],
                ['🌈', '🌅', '✨', '💫', '⭐', '🌟'],
                ['🍖', '🍗', '🥘', '🍲', '🥗', '🍱'],
                ['🧪', '🧬', '🔬', '⚗️', '🧫', '💉'],
                ['⏳', '⏰', '🕐', '⌛', '🔔', '📅'],
                ['📚', '📖', '📕', '📗', '📘', '📙'],
                ['🏛️', '🏰', '🏯', '🗿', '🕌', '⛪'],
                ['👑', '💎', '💍', '🔱', '⚜️', '🪑'],
                ['❄️', '🧊', '⛄', '🌨️', '🥶', '❃']
            ];

            const icones = iconesPorReino[estado.renoAtual] || iconesPorReino[0];

            estado.cartas.forEach((carta, idx) => {
                const btn = document.createElement('button');
                btn.className = 'carta';

                const estaVirada = estado.viradas.has(carta.id);
                const estaCompleta = estado.paresCompletos.has(carta.parId);

                const iconAleatorio = icones[idx % icones.length];
                btn.setAttribute('data-icon', iconAleatorio);

                if (estaCompleta) {
                    btn.classList.add('casada');
                } else if (estaVirada) {
                    btn.classList.add('virada');
                }

                btn.textContent = estaVirada ? carta.conteudo : '🛡️';
                btn.onclick = () => clicarCarta(idx);
                grid.appendChild(btn);
            });
        }

        function clicarCarta(idx) {
            const carta = estado.cartas[idx];

            // Bloqueiar se jogo completo, par já casado, ou jogador está vendo 2 cartas
            if (estado.paresCompletos.has(carta.parId) || estado.jogoCompleto) return;
            if (estado.viradas.has(carta.id) || estado.selecionadas.includes(idx)) return;
            if (estado.bloqueado) return;

            estado.viradas.add(carta.id);
            estado.selecionadas.push(idx);

            if (estado.selecionadas.length === 2) {
                estado.bloqueado = true; // Bloquear cliques enquanto verifica
                const [idx1, idx2] = estado.selecionadas;
                if (estado.cartas[idx1].parId === estado.cartas[idx2].parId) {
                    // Pares casados - permanecem abertos
                    estado.paresCompletos.add(estado.cartas[idx1].parId);
                    estado.pontos++;
                    estado.selecionadas = [];
                    estado.bloqueado = false;
                    verificarVitoria();
                } else {
                    // Pares não casados - fecham após 1 segundo
                    setTimeout(() => {
                        estado.viradas.delete(estado.cartas[idx1].id);
                        estado.viradas.delete(estado.cartas[idx2].id);
                        estado.selecionadas = [];
                        estado.bloqueado = false;
                        renderizarGrid();
                    }, 1000);
                }
            }

            renderizarGrid();
            atualizarUI();
        }

        function atualizarUI() {
            const min = Math.floor(estado.tempo / 60);
            const seg = estado.tempo % 60;
            const tempoFormatado = `${min.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;

            document.getElementById('tempo').textContent = tempoFormatado;
            document.getElementById('pares').textContent = `${estado.pontos}/${estado.paresTotal}`;
            document.getElementById('restam').textContent = `${estado.paresTotal - estado.pontos}`;
        }

        function verificarVitoria() {
            if (estado.paresCompletos.size === estado.paresTotal) {
                estado.jogoCompleto = true;
                clearInterval(estado.intervaloTempo);

                const min = Math.floor(estado.tempo / 60);
                const seg = estado.tempo % 60;
                const tempoFormatado = `${min.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;

                document.getElementById('tempo-final').textContent = tempoFormatado;
                document.getElementById('overlay-vitoria').classList.add('ativo');
            }
        }

        function voltarMenu() {
            clearInterval(estado.intervaloTempo);
            document.getElementById('menu').classList.remove('hidden');
            document.getElementById('jogo').classList.remove('ativo');
            document.getElementById('overlay-vitoria').classList.remove('ativo');
        }

        // Inicializar textos
        atualizarTextos();
    </script>
